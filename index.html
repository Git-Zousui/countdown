<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>会える日まで</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg-color: #fef6f6; --card-bg: #ffffff; --text-color: #4a4a4a; --accent-color: #ff7b93; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: var(--card-bg); padding: 40px 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(255, 123, 147, 0.15); width: 80%; max-width: 350px; }
        .days-box { font-size: 5.5rem; font-weight: 800; color: var(--accent-color); line-height: 1; margin: 15px 0; }
        .unit { font-size: 1.5rem; font-weight: 600; color: var(--text-color); }
        .target-date { font-size: 0.9rem; color: #8e8e93; margin-bottom: 20px; }
        
        /* オレンジ色ボタンのスタイル */
        button { 
            background: #ff922b; border: none; padding: 10px 20px; border-radius: 20px; 
            color: white; font-weight: bold; cursor: pointer; margin: 5px; 
            font-size: 0.85rem; transition: background 0.2s; 
        }
        button:active { background: #f76707; }
        #notification-btn { background: var(--accent-color); }
        #notification-btn:active { background: #e0637b; }
        
        .date-picker-wrapper { margin-top: 15px; }
        input[type="date"] { padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; color: var(--text-color); outline: none; }
    </style>
</head>
<body>
<div class="container">
    <div>会えるまで</div>
    <div class="days-box"><span id="days-count">--</span><span class="unit" id="days-unit" style="display:none;">日</span></div>
    <div class="target-date" id="target-date-display">予定が設定されていません</div>
    <div class="date-picker-wrapper"><input type="date" id="date-input" style="display:none;"></div>
    <button id="setup-btn" onclick="toggleDatePicker()">日付を設定する</button>
    <button id="notification-btn" onclick="requestNotificationPermission()">通知を許可する</button>
</div>
<script>
    let targetDateStr = localStorage.getItem('meetTargetDate'); 

    // 残り日数を計算する関数
    function getRemainingDays() {
        if (!targetDateStr) return null;
        const now = new Date();
        const target = new Date(targetDateStr + 'T00:00:00');
        const diffTime = target - now;
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }

    function updateCountdown() {
        const countElement = document.getElementById('days-count');
        const unitElement = document.getElementById('days-unit');
        const dateDisplay = document.getElementById('target-date-display');
        
        const diffDays = getRemainingDays();
        
        if (diffDays === null) {
            countElement.innerText = '?';
            unitElement.style.display = 'none';
            dateDisplay.innerText = '下の手続きから、会える日を設定して、通知も許可してみてね！';
            return;
        }

        unitElement.style.display = 'inline';
        if (diffDays > 0) {
            countElement.innerText = diffDays;
            dateDisplay.innerText = `次のデート：${targetDateStr.replace(/-/g, '/')}`;
        } else if (diffDays === 0) {
            countElement.innerText = '0';
            dateDisplay.innerText = 'ついに今日会える日です！❤️';
        } else {
            countElement.innerText = '-';
            unitElement.style.display = 'none';
            dateDisplay.innerText = '新しい予定を設定してください';
        }
    }

    // アプリ起動時にローカル通知を発生させる関数
    function triggerLocalNotification() {
        if (Notification.permission === 'granted' && targetDateStr) {
            const diffDays = getRemainingDays();
            let message = '';
            
            if (diffDays > 0) {
                message = `会える日まで、あと 【 ${diffDays}日 】 です！楽しみだね！`;
            } else if (diffDays === 0) {
                message = 'ついに今日会える日です！最高だね❤️';
            } else {
                return; 
            }

            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification('カウントダウン', {
                    body: message,
                    icon: 'icon.png',
                    badge: 'icon.png'
                });
            });
        }
    }

    function toggleDatePicker() {
        const input = document.getElementById('date-input');
        const btn = document.getElementById('setup-btn');
        if (input.style.display === 'none') {
            input.style.display = 'inline-block';
            btn.innerText = '決定';
            if(targetDateStr) input.value = targetDateStr;
        } else {
            if (input.value) {
                targetDateStr = input.value;
                localStorage.setItem('meetTargetDate', targetDateStr);
                updateCountdown();
                setTimeout(triggerLocalNotification, 500);
            }
            input.style.display = 'none';
            btn.innerText = '日付を変更する';
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
