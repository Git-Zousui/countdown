<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>会える日まで</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg-color: #fef6f6; --text-color: #4a4a4a; --accent-color: #ff7b93; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* 📸 背景スライドショー用のスタイル */
        #bg-slideshow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }
        .bg-slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; /* ふわっと1.5秒で切り替え */
            z-index: -1;
        }
        .bg-slide.active {
            opacity: 1;
            z-index: 0;
        }

        /* 🤍 画面下部のコンテナをミニマルに調整 */
        .container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.65); 
            padding: 20px 20px; /* 上下の余白を狭くしてスリムに */
            border-radius: 20px; 
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.08); 
            width: 82%; 
            max-width: 330px; 
            margin-bottom: 30px; /* 位置を少し下げて写真を広く見せる */
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            z-index: 10;
            position: relative;
        }

        .title-text { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.5px; }

        /* 🌟 カウント部分（？や数字）のサイズを小さく調整 */
        .days-box { font-size: 4rem; /* 5remから4remに縮小 */ font-weight: 800; color: var(--accent-color); line-height: 1.1; margin: 5px 0; }
        .unit { font-size: 1.2rem; font-weight: 600; color: var(--text-color); }
        
        .target-date { font-size: 0.75rem; color: #555; margin-bottom: 12px; font-weight: 500; line-height: 1.3; }
        
        /* ボタン類も全体的に小ぶりに調整 */
        button { background: #ff922b; border: none; padding: 8px 16px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; margin: 3px; font-size: 0.8rem; transition: background 0.2s; }
        button:active { background: #f76707; }
        .date-picker-wrapper { margin-top: 8px; }
        input[type="date"] { padding: 6px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.9rem; color: var(--text-color); outline: none; }
        
        #image-input { display: none; }
        .sub-btn { background: #8e8e93; font-size: 0.7rem; padding: 5px 10px; }
        .sub-btn:active { background: #636366; }
    </style>
</head>
<body onclick="initAudio()">

<div id="bg-slideshow">
    <div class="bg-slide" id="slide-0"></div>
    <div class="bg-slide" id="slide-1"></div>
    <div class="bg-slide" id="slide-2"></div>
    <div class="bg-slide" id="slide-3"></div>
    <div class="bg-slide" id="slide-4"></div>
</div>

<div class="container">
    <div class="title-text">会えるまで</div>
    <div class="days-box"><span id="days-count">?</span><span class="unit" id="days-unit" style="display:none;">日</span></div>
    <div class="target-date" id="target-date-display">下の手続きから設定してね！</div>
    <div class="date-picker-wrapper"><input type="date" id="date-input" style="display:none;"></div>
    
    <button id="setup-btn" onclick="toggleDatePicker()">日付を設定する</button>
    
    <div style="margin-top: 10px;">
        <label for="image-input" class="sub-btn" style="color:white; font-weight:bold; border-radius:20px; padding:5px 10px; cursor:pointer; background:#8e8e93; font-size:0.7rem;">背景画像を複数選ぶ</label>
        <input type="file" id="image-input" accept="image/*" multiple onchange="loadImages(event)">
    </div>
</div>

<audio id="bgm" src="bgm.mp3" loop></audio>

<script>
    var targetDateStr = localStorage.getItem('meetTargetDate'); 
    var audioStarted = false;
    
    // スライドショーの読み込み処理
    var savedImagesJSON = localStorage.getItem('bgImagesSlideshow');
    var bgImages = [];
    if (savedImagesJSON) {
        bgImages = JSON.parse(savedImagesJSON);
    }
    var currentSlideIndex = 0;
    var slideElements = [
        document.getElementById('slide-0'),
        document.getElementById('slide-1'),
        document.getElementById('slide-2'),
        document.getElementById('slide-3'),
        document.getElementById('slide-4')
    ];
    var slideshowInterval;

    // 🌟 自動再生ブロックを回避して音楽を流す関数
    function initAudio() {
        if (audioStarted) return;
        var bgm = document.getElementById('bgm');
        bgm.play().then(function() {
            audioStarted = true;
        }).catch(function(err) {
            console.log("Audio play blocked:", err);
        });
    }

    // スライドショーの制御
    function startSlideshow() {
        if (bgImages.length === 0) return;
        
        for (var i = 0; i < slideElements.length; i++) {
            if (i < bgImages.length) {
                slideElements[i].style.backgroundImage = "url('" + bgImages[i] + "')";
            } else {
                slideElements[i].style.backgroundImage = "none";
                slideElements[i].classList.remove('active');
            }
        }

        currentSlideIndex = 0;
        slideElements[0].classList.add('active');

        // 2枚以上あれば10秒ごとに自動フェード切り替え
        if (bgImages.length > 1) {
            clearInterval(slideshowInterval);
            slideshowInterval = setInterval(function() {
                var previousIndex = currentSlideIndex;
                currentSlideIndex = (currentSlideIndex + 1) % bgImages.length;
                
                slideElements[previousIndex].classList.remove('active');
                slideElements[currentSlideIndex].classList.add('active');
            }, 10000); 
        }
    }

    // 複数画像のストレージ保存
    function loadImages(event) {
        var files = event.target.files;
        if (!files || files.length === 0) return;

        bgImages = [];
        var fileCount = Math.min(files.length, 5); // 最大5枚まで

        var loadedCount = 0;
        for (var i = 0; i < fileCount; i++) {
            (function(index) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    bgImages.push(e.target.result);
                    loadedCount++;
                    
                    if (loadedCount === fileCount) {
                        try {
                            localStorage.setItem('bgImagesSlideshow', JSON.stringify(bgImages));
                            startSlideshow();
                        } catch (error) {
                            alert("画像の合計サイズが大きすぎるみたい。それらの画像1枚ずつスクショして、アップロードすると容量減るから試してみて！");
                            bgImages = [];
                            localStorage.removeItem('bgImagesSlideshow');
                            startSlideshow();
                        }
                    }
                };
                reader.readAsDataURL(files[index]);
            })(i);
        }
    }

    function updateCountdown() {
        var countElement = document.getElementById('days-count');
        var unitElement = document.getElementById('days-unit');
        var dateDisplay = document.getElementById('target-date-display');
        var btn = document.getElementById('setup-btn');
        
        if (!targetDateStr) {
            countElement.innerText = '?';
            unitElement.style.display = 'none';
            dateDisplay.innerText = '下の手続きから設定してね！';
            btn.innerText = '日付を設定する';
            return;
        }

        var now = new Date();
        var target = new Date(targetDateStr.replace(/-/g, '/') + ' 00:00:00');
        var diffTime = target.getTime() - now.getTime();
        var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        unitElement.style.display = 'inline';
        btn.innerText = '日付を変更する';

        if (diffDays > 0) {
            countElement.innerText = diffDays;
            dateDisplay.innerText = '次会える日：' + targetDateStr.replace(/-/g, '/');
        } else if (diffDays === 0) {
            countElement.innerText = '0';
            dateDisplay.innerText = 'ついに今日会えるね☺️';
        } else {
            countElement.innerText = '-';
            unitElement.style.display = 'none';
            dateDisplay.innerText = '新しい予定を設定してね！';
        }
    }

    function toggleDatePicker() {
        var input = document.getElementById('date-input');
        var btn = document.getElementById('setup-btn');
        if (input.style.display === 'none') {
            input.style.display = 'inline-block';
            btn.innerText = '決定';
            if (targetDateStr) input.value = targetDateStr;
        } else {
            if (input.value) {
                targetDateStr = input.value;
                localStorage.setItem('meetTargetDate', targetDateStr);
                updateCountdown();
            }
            input.style.display = 'none';
            if (targetDateStr) {
                btn.innerText = '日付を変更する';
            } else {
                btn.innerText = '日付を設定する';
            }
        }
    }

    window.onload = function() {
        updateCountdown();
        startSlideshow();
    };
</script>
</body>
</html>
