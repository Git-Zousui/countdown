<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>会える日まで</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg-color: #fef6f6; --text-color: #4a4a4a; --accent-color: #ff7b93; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            box-sizing: border-box;
            overflow: hidden; /* スライドショーのための調整 */
            position: relative; /* スライドショーのための調整 */
        }

        /* 🌟 複数背景スライドショーのためのスタイル */
        #bg-slideshow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; /* コンテナより後ろに配置 */
        }
        .bg-slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0; /* 初期は透明 */
            transition: opacity 1.5s ease-in-out; /* ふわっと切り替わるアニメーション */
            z-index: -1;
        }
        .bg-slide.active {
            opacity: 1; /* アクティブなスライドだけ表示 */
            z-index: 0;
        }

        .container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.65); 
            padding: 30px 25px; 
            border-radius: 24px; 
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.08); 
            width: 85%; 
            max-width: 350px; 
            margin-bottom: 40px; 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            z-index: 10; /* 最前面に配置 */
            position: relative;
        }

        .days-box { font-size: 5rem; font-weight: 800; color: var(--accent-color); line-height: 1; margin: 10px 0; }
        .unit { font-size: 1.4rem; font-weight: 600; color: var(--text-color); }
        .target-date { font-size: 0.85rem; color: #555; margin-bottom: 15px; font-weight: 500; }
        
        button { background: #ff922b; border: none; padding: 10px 20px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; margin: 5px; font-size: 0.85rem; transition: background 0.2s; }
        button:active { background: #f76707; }
        .date-picker-wrapper { margin-top: 10px; }
        input[type="date"] { padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; color: var(--text-color); outline: none; }
        
        /* 画像選択ボタン */
        #image-input { display: none; }
        .sub-btn { background: #8e8e93; font-size: 0.75rem; padding: 6px 12px; }
        .sub-btn:active { background: #636366; }
    </style>
</head>
<body>

<div id="bg-slideshow">
    <div class="bg-slide" id="slide-0"></div>
    <div class="bg-slide" id="slide-1"></div>
    <div class="bg-slide" id="slide-2"></div>
    <div class="bg-slide" id="slide-3"></div>
    <div class="bg-slide" id="slide-4"></div>
</div>

<div class="container">
    <div>会えるまで</div>
    <div class="days-box"><span id="days-count">?</span><span class="unit" id="days-unit" style="display:none;">日</span></div>
    <div class="target-date" id="target-date-display">予定が設定されていません</div>
    <div class="date-picker-wrapper"><input type="date" id="date-input" style="display:none;"></div>
    
    <button id="setup-btn" onclick="toggleDatePicker()">日付を設定する</button>
    
    <div style="margin-top: 12px;">
        <label for="image-input" class="sub-btn" style="color:white; font-weight:bold; border-radius:20px; padding:6px 12px; cursor:pointer; background:#8e8e93; font-size:0.75rem;">背景画像を複数選ぶ</label>
        <input type="file" id="image-input" accept="image/*" multiple onchange="loadImages(event)">
    </div>
</div>

<script>
    var targetDateStr = localStorage.getItem('meetTargetDate'); 
    
    // 🌟 複数背景スライドショーのための変数とロジック
    var savedImagesJSON = localStorage.getItem('bgImagesSlideshow');
    var bgImages = [];
    if (savedImagesJSON) {
        bgImages = JSON.parse(savedImagesJSON);
    }
    var currentSlideIndex = 0;
    var slideElements = [
        document.getElementById('slide-0'),
        document.getElementById('slide-1'),
        document.getElementById('slide-2'),
        document.getElementById('slide-3'),
        document.getElementById('slide-4')
    ];
    var slideshowInterval;

    // 🌟 初期背景（単一）の設定をスライドショーに統合
    var savedImage = localStorage.getItem('bgImage');
    if (savedImage && bgImages.length === 0) {
        // 以前設定した単一画像がある場合、それをスライドショーに変換
        bgImages.push(savedImage);
        localStorage.setItem('bgImagesSlideshow', JSON.stringify(bgImages));
        localStorage.removeItem('bgImage'); // 古いキーを削除
    }

    // 🌟 スライドショーを開始する関数
    function startSlideshow() {
        if (bgImages.length === 0) return;
        
        // すべてのスライド要素に画像をセット
        for (var i = 0; i < slideElements.length; i++) {
            if (i < bgImages.length) {
                slideElements[i].style.backgroundImage = "url('" + bgImages[i] + "')";
            } else {
                slideElements[i].style.backgroundImage = "none";
                slideElements[i].classList.remove('active');
            }
        }

        // 最初のスライドを表示
        currentSlideIndex = 0;
        slideElements[0].classList.add('active');

        // 2枚以上ある場合、自動切り替えを開始
        if (bgImages.length > 1) {
            clearInterval(slideshowInterval);
            slideshowInterval = setInterval(function() {
                var previousIndex = currentSlideIndex;
                currentSlideIndex = (currentSlideIndex + 1) % bgImages.length;
                
                // フェードアニメーションで切り替え
                slideElements[previousIndex].classList.remove('active');
                slideElements[currentSlideIndex].classList.add('active');
            }, 10000); // 🌟 切り替え間隔（10秒 = 10000ミリ秒）
        }
    }

    // 🌟 複数画像を読み込む新しい関数
    function loadImages(event) {
        var files = event.target.files;
        if (!files || files.length === 0) return;

        bgImages = []; // 配列をリセット
        var fileCount = Math.min(files.length, 5); // 最大5枚まで

        var loadedCount = 0;
        for (var i = 0; i < fileCount; i++) {
            (function(index) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    bgImages.push(e.target.result);
                    loadedCount++;
                    
                    // すべての画像が読み込まれたら記憶して開始
                    if (loadedCount === fileCount) {
                        try {
                            localStorage.setItem('bgImagesSlideshow', JSON.stringify(bgImages));
                            startSlideshow();
                        } catch (error) {
                            alert("画像の合計サイズが大きすぎるみたい。載せたい画像のスクショをとって、それらを使うと容量が減るので上手くいくよ！試してみて！");
                            bgImages = [];
                            localStorage.removeItem('bgImagesSlideshow');
                            startSlideshow();
                        }
                    }
                };
                reader.readAsDataURL(files[index]);
            })(i);
        }
    }

    function updateCountdown() {
        var countElement = document.getElementById('days-count');
        var unitElement = document.getElementById('days-unit');
        var dateDisplay = document.getElementById('target-date-display');
        var btn = document.getElementById('setup-btn');
        
        if (!targetDateStr) {
            countElement.innerText = '?';
            unitElement.style.display = 'none';
            dateDisplay.innerText = '下の手続きから、会える日を設定してね！';
            btn.innerText = '日付を設定する';
            return;
        }

        var now = new Date();
        var target = new Date(targetDateStr.replace(/-/g, '/') + ' 00:00:00');
        var diffTime = target.getTime() - now.getTime();
        var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        unitElement.style.display = 'inline';
        btn.innerText = '日付を変更する';

        if (diffDays > 0) {
            countElement.innerText = diffDays;
            dateDisplay.innerText = '次に会える日：' + targetDateStr.replace(/-/g, '/');
        } else if (diffDays === 0) {
            countElement.innerText = '0';
            dateDisplay.innerText = 'ついに今日会えるね☺️';
        } else {
            countElement.innerText = '-';
            unitElement.style.display = 'none';
            dateDisplay.innerText = '新しい予定を設定してね！';
        }
    }

    function toggleDatePicker() {
        var input = document.getElementById('date-input');
        var btn = document.getElementById('setup-btn');
        if (input.style.display === 'none') {
            input.style.display = 'inline-block';
            btn.innerText = '決定';
            if (targetDateStr) input.value = targetDateStr;
        } else {
            if (input.value) {
                targetDateStr = input.value;
                localStorage.setItem('meetTargetDate', targetDateStr);
                updateCountdown();
            }
            input.style.display = 'none';
            if (targetDateStr) {
                btn.innerText = '日付を変更する';
            } else {
                btn.innerText = '日付を設定する';
            }
        }
    }

    window.onload = function() {
        updateCountdown();
        startSlideshow(); // 🌟 起動時にスライドショーを開始
    };
</script>
</body>
</html>
