<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>会える日まで</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg-color: #fef6f6; --text-color: #4a4a4a; --accent-color: #ff7b93; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* 📸 背景スライドショー */
        #bg-slideshow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }
        .bg-slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: -1;
        }
        .bg-slide.active {
            opacity: 1;
            z-index: 0;
        }

        /* 🤍 画面下部のコンテナ */
        .container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.75); 
            padding: 16px 14px; 
            border-radius: 24px; 
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.08); 
            width: 88%; 
            max-width: 340px; 
            margin-bottom: 20px; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            z-index: 10;
            position: relative;
        }

        /* 🗺️ 時差・時計エリア */
        .clocks-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding-bottom: 6px;
        }
        .clock-box { flex: 1; }
        .clock-label { font-size: 0.65rem; color: #777; font-weight: bold; margin-bottom: 2px; }
        .clock-time { font-size: 0.95rem; font-weight: 700; color: #333; }

        /* 💡 ランダムメッセージエリア */
        .message-area {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            min-height: 1.2rem;
            margin-bottom: 8px;
            padding: 0 5px;
            line-height: 1.4;
        }

        .title-text { font-size: 0.8rem; font-weight: 500; color: #666; letter-spacing: 0.5px; }

        /* ⏳ リアルタイムカウントダウン */
        .days-box { font-size: 2rem; font-weight: 800; color: var(--accent-color); line-height: 1.2; margin: 4px 0 8px 0; }
        .unit { font-size: 1.2rem; font-weight: 600; color: var(--text-color); }
        
        .target-date { font-size: 0.7rem; color: #777; margin-bottom: 8px; font-weight: 500; }
        
        /* ⚙️ 設定エリアのスタイル */
        .settings-wrapper { 
            margin-top: 8px; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.5); 
            padding: 10px 8px; 
            border-radius: 16px; 
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .input-group { display: flex; gap: 4px; justify-content: center; width: 100%; }
        input[type="date"], input[type="text"] { padding: 6px 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.8rem; color: var(--text-color); outline: none; text-align: center; box-sizing: border-box; }
        input[type="text"] { width: 98%; }
        input[type="date"] { width: 98%; }
        
        .save-btn { background: #ff922b; border: none; padding: 6px 20px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 0.75rem; width: 98%; }
        .edit-btn { background: #ff922b; border: none; padding: 6px 14px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; font-size: 0.75rem; margin-top: 4px; }
        
        #image-input { display: none; }
        .sub-btn { background: #8e8e93; font-size: 0.65rem; padding: 4px 10px; display: inline-block; }
    </style>
</head>
<body onclick="initAudio()">

<div id="bg-slideshow">
    <div class="bg-slide" id="slide-0"></div>
    <div class="bg-slide" id="slide-1"></div>
    <div class="bg-slide" id="slide-2"></div>
    <div class="bg-slide" id="slide-3"></div>
    <div class="bg-slide" id="slide-4"></div>
</div>

<div class="container">
    <div class="clocks-container">
        <div class="clock-box">
            <div class="clock-label">TOKYO 🇯🇵</div>
            <div class="clock-time" id="clock-tokyo">00:00</div>
        </div>
        <div class="clock-box" style="border-left: 1px solid rgba(0,0,0,0.06);">
            <div class="clock-label">LONDON 🇬🇧</div>
            <div class="clock-time" id="clock-london">00:00</div>
        </div>
    </div>

    <div class="message-area" id="random-message">✨</div>

    <div class="title-text" id="app-title">会えるまで</div>
    
    <div class="days-box" id="countdown-fluid">?-日 --:--:--</div>
    
    <div class="target-date" id="target-date-display">名前と予定日を入力してください</div>
    
    <div class="settings-wrapper" id="settings-area">
        <div class="input-group" style="margin-bottom: 6px;">
            <input type="text" id="girlfriend-name-input" placeholder="あなたの名前">
        </div>
        <div class="input-group">
            <input type="date" id="date-input">
        </div>
        <button class="save-btn" onclick="saveSettingsData()">設定を保存する</button>
    </div>

    <button id="edit-open-btn" class="edit-btn" style="display:none;" onclick="openSettingsArea()">設定を変更する</button>
    
    <div style="margin-top: 8px;">
        <label for="image-input" class="sub-btn" style="color:white; font-weight:bold; border-radius:20px; cursor:pointer; background:#8e8e93;">背景画像を複数選ぶ</label>
        <input type="file" id="image-input" accept="image/*" multiple onchange="loadImages(event)">
    </div>
</div>

<audio id="bgm" src="bgm.mp3" loop></audio>

<script>
    var targetDateStr = localStorage.getItem('meetTargetDate') || ''; 
    var girlfriendName = localStorage.getItem('girlfriendName') || '彼女';
    var audioStarted = false;
    
    // スライドショー設定
    var bgImages = [];
    try {
        var savedImagesJSON = localStorage.getItem('bgImagesSlideshow');
        if (savedImagesJSON) {
            bgImages = JSON.parse(savedImagesJSON);
        }
    } catch(e) { console.error(e); }
    
    var currentSlideIndex = 0;
    var slideElements = [
        document.getElementById('slide-0'), document.getElementById('slide-1'),
        document.getElementById('slide-2'), document.getElementById('slide-3'),
        document.getElementById('slide-4')
    ];
    var slideshowInterval;

    // 彼女視点のメッセージテンプレート
    var mondayMessages = [
        "新しい一週間が始まったね。無理せずマイペースにいこう！☕️",
        "{girl}、大好きだよ☺️",
        "不安なことは一緒に乗り越えよう！",
        "{girl}、可愛い！",
        "辛いことがあったら、遠慮せず話してね。一緒に悩もう！",
        "月曜日お疲れ様！{girl}に会える日にまた一歩近づいた！"
    ];
    var tuesdayMessages = [
        "{girl}、火曜日もお疲れ様！,
        "{girl}、大好きだよ☺️",
        "色々一緒に乗り越えよう！",
        "今日も一日よく頑張りました！{girl}へハグを送るね🫂",
        "{girl}は十分頑張ってる！たまにはサボっちゃえ笑"
    ];
    var wednesdayMessages = [
        "水曜日、一週間の折り返しだね！あと半分一緒に頑張ろう！",
        "{girl}、大好き☺️",
        "{girl}、可愛い！",
        "お仕事お疲れ様。ゆっくり休んでね💤"
    ];
    var thursdayMessages = [
        "木曜日お疲れ様！あと少しで週末だね。ワクワク✨",
        "{girl}、大好き過ぎる☺️",
        "{girl}、可愛い！",
        "辛いことがあったら、遠慮せず話してね。一緒に悩もう！",
        "{girl}は十分頑張ってる！たまにはサボっちゃえ笑",
        "いつも一生懸命頑張る{girl}のこと、本当に尊敬してるよ。"
    ];
    var fridayMessages = [
        "{girl}、金曜日お疲れ様！TGIF！本当に頑張ったね🎉",
        "{girl}、大好き〜☺️",
        "飲み過ぎには注意だよ〜。俺も気をつけます！！",
        "卑しい男は近づけません！ｼｯｼｯ🧹",
        "今週も仕事やりきった！お疲れ様！"
    ];
    var weekendMessages = [
        "素敵な週末になりますように！お出かけ楽しんでね🌿",
        "ゆっくり休めてる？無理せずダラダラしちゃえ笑",
        "離れていても、俺と{girl}の心はいつも一緒だよ！",
        "お先に月曜日迎えとくね😔"
    ];

    function setRandomMessage() {
        var now = new Date();
        var dayOfWeek = now.getDay(); 
        var messageList;
        
        switch(dayOfWeek) {
            case 1: messageList = mondayMessages; break;
            case 2: messageList = tuesdayMessages; break;
            case 3: messageList = wednesdayMessages; break;
            case 4: messageList = thursdayMessages; break;
            case 5: messageList = fridayMessages; break;
            default: messageList = weekendMessages; break;
        }
        
        var randomIndex = Math.floor(Math.random() * messageList.length);
        var rawMessage = messageList[randomIndex];
        var formattedMessage = String(rawMessage).split("{girl}").join(girlfriendName);
        
        document.getElementById('random-message').innerText = formattedMessage;
    }

    function updateClocks() {
        var now = new Date();
        document.getElementById('clock-tokyo').innerText = now.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('clock-london').innerText = now.toLocaleTimeString('ja-JP', { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function initAudio() {
        if (audioStarted) return;
        var bgm = document.getElementById('bgm');
        if (bgm) {
            bgm.play().then(function() { audioStarted = true; }).catch(function(err) {});
        }
    }

    function startSlideshow() {
        if (!bgImages || bgImages.length === 0) return;
        for (var i = 0; i < slideElements.length; i++) {
            if (i < bgImages.length) slideElements[i].style.backgroundImage = "url('" + bgImages[i] + "')";
        }
        slideElements[0].classList.add('active');
        if (bgImages.length > 1) {
            setInterval(function() {
                var prev = currentSlideIndex;
                currentSlideIndex = (currentSlideIndex + 1) % bgImages.length;
                slideElements[prev].classList.remove('active');
                slideElements[currentSlideIndex].classList.add('active');
            }, 10000); 
        }
    }

    function loadImages(event) {
        var files = event.target.files;
        if (!files || files.length === 0) return;
        bgImages = [];
        var fileCount = Math.min(files.length, 5);
        var loadedCount = 0;
        for (var i = 0; i < fileCount; i++) {
            (function(index) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    bgImages.push(e.target.result);
                    loadedCount++;
                    if (loadedCount === fileCount) {
                        try {
                            localStorage.setItem('bgImagesSlideshow', JSON.stringify(bgImages));
                            startSlideshow();
                        } catch (error) {
                            alert("画質が大きすぎるみたい。載せたい画像をスクショして、それ使ってみて！。");
                        }
                    }
                };
                reader.readAsDataURL(files[index]);
            })(i);
        }
    }

    function updateCountdownFluid() {
        var displayElement = document.getElementById('countdown-fluid');
        var dateDisplay = document.getElementById('target-date-display');
        
        if (!targetDateStr) {
            displayElement.innerText = '?-日 --:--:--';
            dateDisplay.innerText = '名前と予定日を入力してください';
            return;
        }

        var now = new Date();
        var target = new Date(targetDateStr.replace(/-/g, '/') + ' 00:00:00');
        var diffTime = target.getTime() - now.getTime();

        if (diffTime > 0) {
            var diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            var diffHours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var diffMinutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            var diffSeconds = Math.floor((diffTime % (1000 * 60)) / (1000));
            displayElement.innerHTML = diffDays + '<span class="unit">日</span> ' + ('0' + diffHours).slice(-2) + ':' + ('0' + diffMinutes).slice(-2) + ':' + ('0' + diffSeconds).slice(-2);
            dateDisplay.innerText = '次に会える日：' + targetDateStr.replace(/-/g, '/');
        } else {
            displayElement.innerText = 'Today! ❤️';
            dateDisplay.innerText = 'ついに今日会えるね☺️';
        }
    }

    function saveSettingsData() {
        var dateInput = document.getElementById('date-input').value;
        var girlIn = document.getElementById('girlfriend-name-input').value.trim();

        if (dateInput) { targetDateStr = dateInput; localStorage.setItem('meetTargetDate', targetDateStr); }
        if (girlIn) { girlfriendName = girlIn; localStorage.setItem('girlfriendName', girlfriendName); }

        updateCountdownFluid();
        setRandomMessage();

        document.getElementById('settings-area').style.display = 'none';
        document.getElementById('edit-open-btn').style.display = 'inline-block';
    }

    function openSettingsArea() {
        document.getElementById('settings-area').style.display = 'block';
        document.getElementById('edit-open-btn').style.display = 'none';
    }

    window.onload = function() {
        setRandomMessage();
        startSlideshow();
        updateClocks();
        updateCountdownFluid();
        
        if (targetDateStr) document.getElementById('date-input').value = targetDateStr;
        if (girlfriendName !== '彼女') document.getElementById('girlfriend-name-input').value = girlfriendName;

        if (targetDateStr && girlfriendName !== '彼女') {
            document.getElementById('settings-area').style.display = 'none';
            document.getElementById('edit-open-btn').style.display = 'inline-block';
        }

        setInterval(function() { updateClocks(); updateCountdownFluid(); }, 1000);
    };
</script>
</body>
</html>
